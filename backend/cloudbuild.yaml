steps:

  - name: 'gcr.io/cloud-builders/docker'
    id: Build-Image
    args:
      [
        'build',
        '-t',
        'gcr.io/$PROJECT_ID/sb-ecom-backend:$COMMIT_SHA',
        '-f',
        'backend/Dockerfile',
        'backend'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    id: Push-Image
    args:
      [
        'push',
        'gcr.io/$PROJECT_ID/sb-ecom-backend:$COMMIT_SHA'
      ]

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: Deploy
    entrypoint: gcloud
    args:
      [
        'run',
        'deploy',
        'sb-ecom-backend',
        '--image',
        'gcr.io/$PROJECT_ID/sb-ecom-backend:$COMMIT_SHA',
        '--region',
        'europe-west1',
        '--platform',
        'managed',
        '--allow-unauthenticated'
      ]

images:
  - 'gcr.io/$PROJECT_ID/sb-ecom-backend:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY